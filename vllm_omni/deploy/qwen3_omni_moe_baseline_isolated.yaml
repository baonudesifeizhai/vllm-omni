# Paired baseline for qwen3_omni_moe_dspark_k7_isolated.yaml.
# The topology and runtime settings are identical; only Thinker DSpark is absent.
# GPU 0: vanilla Thinker; GPU 1: Talker + native RVQ MTP; GPU 2: Code2Wav.

base_config: qwen3_omni_moe.yaml

stages:
  - stage_id: 0
    devices: "0"
    enforce_eager: true
    async_scheduling: false

  - stage_id: 1
    devices: "1"
    default_sampling_params:
      temperature: 0.9
      max_tokens: 512
      seed: 0

  - stage_id: 2
    devices: "2"
