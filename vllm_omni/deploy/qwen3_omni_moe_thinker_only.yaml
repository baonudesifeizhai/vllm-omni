# Qwen3-Omni Thinker-only deployment. This avoids loading Talker and Code2Wav
# for text evaluation, teacher response generation, and hidden-state extraction.
pipeline: qwen3_omni_moe_thinker_only
async_chunk: false
trust_remote_code: true
enable_prefix_caching: false
enable_chunked_prefill: false

stages:
  - stage_id: 0
    devices: "0"
    max_num_batched_tokens: 32768
    max_num_seqs: 64
    gpu_memory_utilization: 0.9
    default_sampling_params:
      temperature: 0.0
      max_tokens: 2048
