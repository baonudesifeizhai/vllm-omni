# Qwen3-Omni Thinker-only teacher deployment for dataset regeneration.
# Four independent replicas maximize throughput for unrelated chat requests.
pipeline: qwen3_omni_moe_thinker_only
async_chunk: false
trust_remote_code: true
enable_prefix_caching: false
enable_chunked_prefill: false

stages:
  - stage_id: 0
    devices: "0,1,2,3"
    num_replicas: 4
    max_num_batched_tokens: 32768
    max_num_seqs: 64
    gpu_memory_utilization: 0.9
    default_sampling_params:
      temperature: 0.0
      max_tokens: 2048
