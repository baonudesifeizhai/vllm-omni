# Qwen3-Omni image-to-speech E2E topology for DSpark/Talker measurements.
# GPU 0: Thinker + DSpark k=7; GPU 1: Talker + native RVQ MTP;
# GPU 2: Code2Wav.  Keeping Code2Wav off the Talker GPU makes the Talker
# frame-rate trace a clean single-stage measurement.

base_config: qwen3_omni_moe.yaml

stages:
  - stage_id: 0
    devices: "0"
    enforce_eager: true
    async_scheduling: false
    engine_args:
      speculative_config:
        method: dspark
        model: /mnt/minecraft/model/Qwen3-Omni-30B-A3B-Instruct-dspark-thinker-image-l5-aux5-v1/2
        num_speculative_tokens: 7
        draft_tensor_parallel_size: 1

  - stage_id: 1
    devices: "1"
    default_sampling_params:
      temperature: 0.9
      max_tokens: 512
      seed: 0

  - stage_id: 2
    devices: "2"
