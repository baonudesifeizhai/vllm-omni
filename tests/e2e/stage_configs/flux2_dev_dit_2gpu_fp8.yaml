# Stage config for FLUX.2-dev diffusion serving on 2 CUDA GPUs.
# Used by ModelOpt FP8 online smoke tests.

stage_args:
  - stage_id: 0
    stage_type: diffusion
    runtime:
      devices: "0,1"
      max_batch_size: 1
    engine_args:
      model_stage: dit
      model_class_name: Flux2Pipeline
      max_num_seqs: 1
      trust_remote_code: true
      distributed_executor_backend: "mp"
      parallel_config:
        tensor_parallel_size: 2

    final_output: true
    final_output_type: image
    is_comprehension: false
    default_sampling_params:
      seed: 42

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1
